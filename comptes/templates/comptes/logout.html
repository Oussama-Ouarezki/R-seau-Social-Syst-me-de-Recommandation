{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="card shadow p-5">
            <div class="mb-4">
                <i class="fas fa-sign-out-alt fa-4x text-muted"></i>
            </div>
            <h2 class="fw-bold mb-3">Vous avez été déconnecté</h2>
            <p class="text-muted mb-4">Merci de votre visite. À bientôt !</p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{% url 'comptes:login' %}" class="btn btn-primary px-4 gap-3">Se reconnecter</a>
                <a href="{% url 'publications:feed' %}" class="btn btn-outline-secondary px-4">Retour à l'accueil</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
