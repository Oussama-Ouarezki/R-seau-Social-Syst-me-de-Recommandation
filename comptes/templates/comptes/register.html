{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 text-primary">Inscription</h2>
                <form method="POST">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                        <div class="form-text">{{ field.help_text }}</div>
                        {% endif %}
                        {% for error in field.errors %}
                        <div class="text-danger small">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button class="btn btn-primary btn-lg" type="submit">S'inscrire</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small>Déjà un compte ? <a href="{% url 'comptes:login' %}">Se connecter</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Add bootstrap class to form inputs
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.classList.add('form-control');
    });
</script>
{% endblock %}
