{% extends "base.html" %}


{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Bienvenue</h2>
                    <p class="text-muted">Connectez-vous à votre compte</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" required id="id_username">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" required id="id_password">
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="submit">Se connecter</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Pas encore de compte ? <a
                            href="{% url 'comptes:register' %}">S'inscrire</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
